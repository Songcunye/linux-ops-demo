version: '3.8'

services:
  nginx:
    image: my-nginx:v2
    container_name: compose-nginx
    ports:
      - "8083:80"
    restart: always

  mysql:
    image: mariadb:5.5
    container_name: compose-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: Admin123!
    volumes:
      - /data/compose_mysql:/var/lib/mysql
    restart: always
